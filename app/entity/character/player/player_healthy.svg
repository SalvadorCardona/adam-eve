<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="59" rx="16" ry="4" fill="rgba(0,0,0,0.25)"/>

  <!-- Cape/cloak -->
  <ellipse cx="32" cy="46" rx="13" ry="14" fill="#1a2e5a"/>

  <!-- Armor chest plate -->
  <rect x="24" y="32" width="16" height="18" rx="3" fill="#3a5a9c"/>
  <!-- Armor ribs -->
  <line x1="24" y1="38" x2="40" y2="38" stroke="#2a4a8c" stroke-width="1"/>
  <line x1="24" y1="43" x2="40" y2="43" stroke="#2a4a8c" stroke-width="1"/>
  <!-- Armor highlight -->
  <rect x="26" y="33" width="5" height="10" rx="2" fill="#4a6ab8" opacity="0.6"/>

  <!-- Belt -->
  <rect x="24" y="48" width="16" height="3" rx="1" fill="#8B6914"/>
  <rect x="30" y="47" width="4" height="5" rx="1" fill="#c9a227"/>

  <!-- Left arm + shield -->
  <rect x="13" y="32" width="8" height="14" rx="3" fill="#3a5a9c"/>
  <!-- Shield -->
  <path d="M10 29 L10 44 L17 50 L24 44 L24 29 Z" fill="#1a2e5a" stroke="#c9a227" stroke-width="1.5"/>
  <path d="M17 31 L17 48" stroke="#c9a227" stroke-width="1" opacity="0.7"/>
  <path d="M11 38 L23 38" stroke="#c9a227" stroke-width="1" opacity="0.7"/>
  <circle cx="17" cy="38" r="3" fill="#c9a227"/>

  <!-- Right arm + sword -->
  <rect x="43" y="30" width="8" height="14" rx="3" fill="#3a5a9c"/>
  <!-- Sword blade -->
  <line x1="50" y1="14" x2="53" y2="32" stroke="#d0d8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="14" x2="53" y2="32" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Crossguard -->
  <rect x="46" y="30" width="11" height="3" rx="1.5" fill="#8B6914"/>
  <!-- Grip -->
  <rect x="49" y="32" width="4" height="7" rx="1" fill="#5c3d0a"/>

  <!-- Neck -->
  <rect x="29" y="22" width="6" height="6" rx="2" fill="#f0c8a0"/>

  <!-- Head -->
  <circle cx="32" cy="19" r="11" fill="#f0c8a0"/>

  <!-- Helmet -->
  <path d="M21 18 Q21 7 32 6 Q43 7 43 18 L41 18 Q41 10 32 9 Q23 10 23 18 Z" fill="#1a2e5a"/>
  <!-- Helmet brim -->
  <rect x="20" y="17" width="24" height="3" rx="1.5" fill="#2a4a8c"/>
  <!-- Helmet ridge -->
  <rect x="30" y="6" width="4" height="11" rx="2" fill="#2a4a8c"/>
  <!-- Plume -->
  <path d="M31 6 Q28 2 30 0 Q32 2 32 5 Q34 2 36 0 Q38 2 35 6" fill="#e63946" opacity="0.9"/>

  <!-- Visor / face opening -->
  <rect x="25" y="18" width="14" height="6" rx="2" fill="#0d1b2a"/>
  <!-- Eyes (glowing) -->
  <circle cx="29" cy="21" r="2" fill="#4af0b4"/>
  <circle cx="35" cy="21" r="2" fill="#4af0b4"/>
  <circle cx="29" cy="21" r="1" fill="white" opacity="0.8"/>
  <circle cx="35" cy="21" r="1" fill="white" opacity="0.8"/>

  <!-- Legs -->
  <rect x="25" y="52" width="6" height="8" rx="2" fill="#1a2e5a"/>
  <rect x="33" y="52" width="6" height="8" rx="2" fill="#1a2e5a"/>
  <!-- Boots -->
  <rect x="24" y="57" width="8" height="4" rx="2" fill="#2c1810"/>
  <rect x="32" y="57" width="8" height="4" rx="2" fill="#2c1810"/>
</svg>
