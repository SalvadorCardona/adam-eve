<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .ring { animation: ring 2s ease-out infinite; transform-origin: 50px 28px; }
      .ring2 { animation: ring 2s ease-out infinite 0.7s; transform-origin: 50px 28px; }
      .ring3 { animation: ring 2s ease-out infinite 1.4s; transform-origin: 50px 28px; }
      .blink { animation: blink 1.2s ease-in-out infinite; }
      @keyframes ring {
        0% { r: 5; opacity: 0.9; }
        100% { r: 24; opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
    </style>
  </defs>

  <!-- Ombre -->
  <ellipse cx="50" cy="92" rx="30" ry="5" fill="#000" opacity="0.2"/>

  <!-- Corps principal bâtiment -->
  <rect x="15" y="55" width="70" height="35" rx="3" fill="#1e3a5f" stroke="#1e40af" stroke-width="2"/>
  <!-- Façade centrale -->
  <rect x="28" y="44" width="44" height="30" rx="2" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Toit -->
  <polygon points="25,44 75,44 80,38 20,38" fill="#1d4ed8"/>
  <!-- Fenêtres gauche -->
  <rect x="32" y="50" width="9" height="9" rx="1.5" fill="#bfdbfe" opacity="0.9"/>
  <!-- Fenêtres droite -->
  <rect x="59" y="50" width="9" height="9" rx="1.5" fill="#bfdbfe" opacity="0.9"/>
  <!-- Porte centrale -->
  <rect x="44" y="66" width="12" height="19" rx="1.5" fill="#1e3a5f"/>
  <circle cx="54" cy="76" r="1.2" fill="#60a5fa"/>

  <!-- Tour antenne -->
  <rect x="47" y="14" width="6" height="28" fill="#374151"/>
  <rect x="42" y="40" width="16" height="4" rx="1" fill="#4b5563"/>

  <!-- Parabole -->
  <ellipse cx="50" cy="28" rx="14" ry="6" fill="none" stroke="#60a5fa" stroke-width="2.5" transform="rotate(-15, 50, 28)"/>
  <line x1="50" y1="28" x2="40" y2="20" stroke="#60a5fa" stroke-width="2"/>

  <!-- Ondes -->
  <circle class="ring" cx="50" cy="28" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle class="ring2" cx="50" cy="28" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle class="ring3" cx="50" cy="28" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- Lumière sommet -->
  <circle class="blink" cx="50" cy="14" r="4" fill="#fbbf24"/>
  <circle class="blink" cx="50" cy="14" r="6" fill="#fbbf24" opacity="0.3"/>
</svg>
