<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="stGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a8a3a"/>
      <stop offset="1" stop-color="#3e6826"/>
    </linearGradient>
    <linearGradient id="stWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a07442"/>
      <stop offset="1" stop-color="#6a4520"/>
    </linearGradient>
    <linearGradient id="stRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5046"/>
      <stop offset="0.5" stop-color="#3a3228"/>
      <stop offset="1" stop-color="#5a5046"/>
    </linearGradient>
    <linearGradient id="stCrate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8a060"/>
      <stop offset="1" stop-color="#a06c34"/>
    </linearGradient>
    <linearGradient id="stBarrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4a20"/>
      <stop offset="0.5" stop-color="#a06840"/>
      <stop offset="1" stop-color="#5a3814"/>
    </linearGradient>
    <linearGradient id="stSign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c890"/>
      <stop offset="1" stop-color="#a87a3c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" fill="url(#stGrass)"/>

  <!-- Drop shadow -->
  <rect x="9" y="11" width="46" height="46" rx="2" fill="rgba(0,0,0,0.35)"/>

  <!-- Walls -->
  <rect x="6" y="8" width="52" height="48" rx="1.5" fill="url(#stWall)" stroke="#2a1808" stroke-width="1"/>

  <!-- Plank lines on walls -->
  <g stroke="#3a2410" stroke-width="0.4" opacity="0.7">
    <line x1="6" y1="14" x2="58" y2="14"/>
    <line x1="6" y1="20" x2="58" y2="20"/>
    <line x1="6" y1="44" x2="58" y2="44"/>
    <line x1="6" y1="50" x2="58" y2="50"/>
  </g>

  <!-- Roof -->
  <rect x="11" y="20" width="42" height="24" fill="url(#stRoof)" stroke="#1a1410" stroke-width="0.8"/>
  <line x1="11" y1="32" x2="53" y2="32" stroke="#1a1410" stroke-width="1.3"/>
  <g stroke="#1a1410" stroke-width="0.25" opacity="0.6">
    <line x1="15" y1="20" x2="15" y2="32"/>
    <line x1="19" y1="20" x2="19" y2="32"/>
    <line x1="23" y1="20" x2="23" y2="32"/>
    <line x1="27" y1="20" x2="27" y2="32"/>
    <line x1="31" y1="20" x2="31" y2="32"/>
    <line x1="35" y1="20" x2="35" y2="32"/>
    <line x1="39" y1="20" x2="39" y2="32"/>
    <line x1="43" y1="20" x2="43" y2="32"/>
    <line x1="47" y1="20" x2="47" y2="32"/>
    <line x1="51" y1="20" x2="51" y2="32"/>
    <line x1="15" y1="32" x2="15" y2="44"/>
    <line x1="19" y1="32" x2="19" y2="44"/>
    <line x1="23" y1="32" x2="23" y2="44"/>
    <line x1="27" y1="32" x2="27" y2="44"/>
    <line x1="31" y1="32" x2="31" y2="44"/>
    <line x1="35" y1="32" x2="35" y2="44"/>
    <line x1="39" y1="32" x2="39" y2="44"/>
    <line x1="43" y1="32" x2="43" y2="44"/>
    <line x1="47" y1="32" x2="47" y2="44"/>
    <line x1="51" y1="32" x2="51" y2="44"/>
  </g>

  <!-- Sign on the roof -->
  <rect x="16" y="33.5" width="32" height="9" rx="0.5" fill="url(#stSign)" stroke="#3a1e08" stroke-width="0.6"/>
  <circle cx="18" cy="35.5" r="0.5" fill="#1e0c04"/>
  <circle cx="46" cy="35.5" r="0.5" fill="#1e0c04"/>
  <circle cx="18" cy="40.5" r="0.5" fill="#1e0c04"/>
  <circle cx="46" cy="40.5" r="0.5" fill="#1e0c04"/>
  <text x="32" y="40.6" font-family="Georgia, 'Times New Roman', serif" font-size="6.6" font-weight="bold" fill="#1e0c04" text-anchor="middle" letter-spacing="0.5">STOCK</text>

  <!-- Loading bay (door at top of building) -->
  <rect x="26" y="8" width="12" height="6" fill="#3a2410" stroke="#1a0e04" stroke-width="0.5"/>
  <line x1="32" y1="8" x2="32" y2="14" stroke="#1a0e04" stroke-width="0.4"/>
  <line x1="28" y1="8" x2="28" y2="14" stroke="#5a3a18" stroke-width="0.3" opacity="0.7"/>
  <line x1="36" y1="8" x2="36" y2="14" stroke="#5a3a18" stroke-width="0.3" opacity="0.7"/>

  <!-- Stacked crates bottom-left -->
  <g>
    <ellipse cx="3.5" cy="60" rx="3.6" ry="1.2" fill="rgba(0,0,0,0.35)"/>
    <rect x="0" y="56" width="7" height="4" fill="url(#stCrate)" stroke="#3a1e08" stroke-width="0.4"/>
    <line x1="0" y1="58" x2="7" y2="58" stroke="#5a3614" stroke-width="0.3" opacity="0.7"/>
    <line x1="3.5" y1="56" x2="3.5" y2="60" stroke="#5a3614" stroke-width="0.3" opacity="0.7"/>

    <rect x="0.6" y="51.6" width="6" height="4" fill="url(#stCrate)" stroke="#3a1e08" stroke-width="0.4"/>
    <line x1="0.6" y1="53.6" x2="6.6" y2="53.6" stroke="#5a3614" stroke-width="0.3" opacity="0.7"/>
    <line x1="3.6" y1="51.6" x2="3.6" y2="55.6" stroke="#5a3614" stroke-width="0.3" opacity="0.7"/>
  </g>

  <!-- Barrels bottom-right -->
  <g>
    <ellipse cx="60" cy="62" rx="5" ry="1.4" fill="rgba(0,0,0,0.35)"/>
    <circle cx="58" cy="60" r="2.6" fill="url(#stBarrel)" stroke="#1e0c04" stroke-width="0.4"/>
    <circle cx="58" cy="60" r="1.4" fill="none" stroke="#3a2410" stroke-width="0.3"/>
    <circle cx="63" cy="60" r="2.6" fill="url(#stBarrel)" stroke="#1e0c04" stroke-width="0.4"/>
    <circle cx="63" cy="60" r="1.4" fill="none" stroke="#3a2410" stroke-width="0.3"/>
    <circle cx="60.5" cy="56" r="2.6" fill="url(#stBarrel)" stroke="#1e0c04" stroke-width="0.4"/>
    <circle cx="60.5" cy="56" r="1.4" fill="none" stroke="#3a2410" stroke-width="0.3"/>
  </g>

  <!-- Wall highlight -->
  <path d="M6 8 L58 8 L57 10 L7 10 Z" fill="white" opacity="0.12"/>
  <path d="M6 8 L8 10 L8 54 L6 56 Z" fill="white" opacity="0.08"/>
</svg>
