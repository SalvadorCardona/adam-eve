<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="iconStWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a07442"/>
      <stop offset="1" stop-color="#6a4520"/>
    </linearGradient>
    <linearGradient id="iconStRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5046"/>
      <stop offset="0.5" stop-color="#3a3228"/>
      <stop offset="1" stop-color="#5a5046"/>
    </linearGradient>
    <linearGradient id="iconStCrate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8a060"/>
      <stop offset="1" stop-color="#a06c34"/>
    </linearGradient>
    <linearGradient id="iconStBarrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4a20"/>
      <stop offset="0.5" stop-color="#a06840"/>
      <stop offset="1" stop-color="#5a3814"/>
    </linearGradient>
    <linearGradient id="iconStSign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c890"/>
      <stop offset="1" stop-color="#a87a3c"/>
    </linearGradient>
  </defs>

  <!-- Walls -->
  <rect x="4" y="6" width="56" height="52" rx="2" fill="url(#iconStWall)" stroke="#1e0c04" stroke-width="1.2"/>

  <!-- Plank lines on walls -->
  <g stroke="#3a2410" stroke-width="0.5" opacity="0.7">
    <line x1="4" y1="13" x2="60" y2="13"/>
    <line x1="4" y1="51" x2="60" y2="51"/>
    <line x1="10" y1="6" x2="10" y2="58"/>
    <line x1="54" y1="6" x2="54" y2="58"/>
  </g>

  <!-- Roof -->
  <rect x="11" y="18" width="42" height="28" fill="url(#iconStRoof)" stroke="#1a1410" stroke-width="0.8"/>
  <line x1="11" y1="32" x2="53" y2="32" stroke="#1a1410" stroke-width="1.4"/>
  <g stroke="#1a1410" stroke-width="0.3" opacity="0.55">
    <line x1="16" y1="18" x2="16" y2="32"/>
    <line x1="22" y1="18" x2="22" y2="32"/>
    <line x1="28" y1="18" x2="28" y2="32"/>
    <line x1="34" y1="18" x2="34" y2="32"/>
    <line x1="40" y1="18" x2="40" y2="32"/>
    <line x1="46" y1="18" x2="46" y2="32"/>
    <line x1="16" y1="32" x2="16" y2="46"/>
    <line x1="22" y1="32" x2="22" y2="46"/>
    <line x1="28" y1="32" x2="28" y2="46"/>
    <line x1="34" y1="32" x2="34" y2="46"/>
    <line x1="40" y1="32" x2="40" y2="46"/>
    <line x1="46" y1="32" x2="46" y2="46"/>
  </g>

  <!-- Loading bay -->
  <rect x="26" y="6" width="12" height="6" fill="#3a2410" stroke="#1a0e04" stroke-width="0.5"/>
  <line x1="32" y1="6" x2="32" y2="12" stroke="#1a0e04" stroke-width="0.5"/>

  <!-- Sign with STOCK -->
  <rect x="14" y="33" width="36" height="11" rx="0.6" fill="url(#iconStSign)" stroke="#3a1e08" stroke-width="0.7"/>
  <circle cx="16.5" cy="35.5" r="0.6" fill="#1e0c04"/>
  <circle cx="47.5" cy="35.5" r="0.6" fill="#1e0c04"/>
  <circle cx="16.5" cy="41.5" r="0.6" fill="#1e0c04"/>
  <circle cx="47.5" cy="41.5" r="0.6" fill="#1e0c04"/>
  <text x="32" y="41.6" font-family="Georgia, 'Times New Roman', serif" font-size="8" font-weight="bold" fill="#1e0c04" text-anchor="middle" letter-spacing="0.6">STOCK</text>

  <!-- Crates bottom-left -->
  <g>
    <rect x="2" y="50" width="9" height="6" fill="url(#iconStCrate)" stroke="#3a1e08" stroke-width="0.5"/>
    <line x1="2" y1="53" x2="11" y2="53" stroke="#5a3614" stroke-width="0.4" opacity="0.7"/>
    <line x1="6.5" y1="50" x2="6.5" y2="56" stroke="#5a3614" stroke-width="0.4" opacity="0.7"/>
  </g>

  <!-- Barrels bottom-right -->
  <g>
    <circle cx="55" cy="55" r="3.6" fill="url(#iconStBarrel)" stroke="#1e0c04" stroke-width="0.5"/>
    <circle cx="55" cy="55" r="2" fill="none" stroke="#3a2410" stroke-width="0.4"/>
    <circle cx="61" cy="56" r="2.6" fill="url(#iconStBarrel)" stroke="#1e0c04" stroke-width="0.5"/>
    <circle cx="61" cy="56" r="1.5" fill="none" stroke="#3a2410" stroke-width="0.3"/>
  </g>
</svg>
