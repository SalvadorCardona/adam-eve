<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a2a14"/>
      <stop offset="1" stop-color="#2a1208"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4e4b8"/>
      <stop offset="1" stop-color="#c8a86c"/>
    </linearGradient>
    <radialGradient id="arcaneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <style>
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: 32px 34px; }
      .float { animation: float 3s ease-in-out infinite; }
      .spark { animation: spark 1.6s ease-in-out infinite; }
      .spark2 { animation: spark 1.6s ease-in-out infinite 0.5s; }
      .spark3 { animation: spark 1.6s ease-in-out infinite 1s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 0.7; transform: scale(1.1); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1.5px); }
      }
      @keyframes spark {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </defs>

  <circle class="pulse" cx="32" cy="34" r="26" fill="url(#arcaneGlow)"/>

  <g class="float">
    <path d="M12 20 Q16 18 30 19 L30 46 Q16 45 12 47 Z" fill="url(#coverGrad)" stroke="#1a0a04" stroke-width="1.2"/>
    <path d="M52 20 Q48 18 34 19 L34 46 Q48 45 52 47 Z" fill="url(#coverGrad)" stroke="#1a0a04" stroke-width="1.2"/>

    <path d="M14 22 Q18 20 30 21 L30 44 Q18 43 14 45 Z" fill="url(#pageGrad)"/>
    <path d="M50 22 Q46 20 34 21 L34 44 Q46 43 50 45 Z" fill="url(#pageGrad)"/>

    <rect x="30" y="18" width="4" height="28" fill="#3a1e08"/>
    <circle cx="32" cy="22" r="1" fill="#d4af37"/>
    <circle cx="32" cy="32" r="1" fill="#d4af37"/>
    <circle cx="32" cy="42" r="1" fill="#d4af37"/>

    <g stroke="#6b4a2a" stroke-width="0.9" stroke-linecap="round" opacity="0.85">
      <line x1="17" y1="26" x2="28" y2="27"/>
      <line x1="17" y1="30" x2="27" y2="31"/>
      <line x1="17" y1="34" x2="28" y2="35"/>
      <line x1="17" y1="38" x2="26" y2="39"/>
      <line x1="36" y1="27" x2="47" y2="26"/>
      <line x1="37" y1="31" x2="47" y2="30"/>
      <line x1="36" y1="35" x2="47" y2="34"/>
      <line x1="38" y1="39" x2="46" y2="38"/>
    </g>

    <g fill="#6d28d9" opacity="0.85">
      <text x="22" y="33" font-size="9" text-anchor="middle" font-family="serif">✦</text>
    </g>
    <g fill="#c9a227">
      <text x="42" y="33" font-size="9" text-anchor="middle" font-family="serif">✧</text>
    </g>

    <g stroke="#d4af37" stroke-width="1" fill="#5a2a14">
      <path d="M12 24 L10 24 L10 42 L12 42 Z"/>
      <path d="M52 24 L54 24 L54 42 L52 42 Z"/>
    </g>
    <circle cx="10" cy="33" r="1.2" fill="#d4af37"/>
    <circle cx="54" cy="33" r="1.2" fill="#d4af37"/>
  </g>

  <circle class="spark" cx="18" cy="14" r="2" fill="#fbbf24"/>
  <circle class="spark2" cx="46" cy="16" r="1.5" fill="#a78bfa"/>
  <circle class="spark3" cx="50" cy="50" r="2" fill="#fbbf24"/>
  <circle class="spark2" cx="14" cy="52" r="1.3" fill="#c4b5fd"/>
</svg>
