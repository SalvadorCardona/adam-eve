<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <style>
      .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: 32px 32px; }
      .float { animation: float 3s ease-in-out infinite; }
      .spark { animation: spark 1.5s ease-in-out infinite; }
      .spark2 { animation: spark 1.5s ease-in-out infinite 0.5s; }
      .spark3 { animation: spark 1.5s ease-in-out infinite 1s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 0.7; transform: scale(1.1); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      @keyframes spark {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </defs>

  <!-- Aura pulsante -->
  <circle class="pulse" cx="32" cy="32" r="28" fill="url(#glow)"/>

  <!-- Livre flottant -->
  <g class="float">
    <!-- Couverture gauche du livre -->
    <rect x="14" y="18" width="16" height="24" rx="2" fill="#6d28d9" stroke="#4c1d95" stroke-width="1"/>
    <!-- Couverture droite du livre -->
    <rect x="30" y="18" width="16" height="24" rx="2" fill="#7c3aed" stroke="#4c1d95" stroke-width="1"/>
    <!-- Pages -->
    <rect x="29" y="19" width="3" height="22" fill="#e9d5ff"/>
    <!-- Lignes de texte gauche -->
    <line x1="17" y1="25" x2="26" y2="25" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="17" y1="29" x2="26" y2="29" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="17" y1="33" x2="26" y2="33" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="17" y1="37" x2="24" y2="37" stroke="#c4b5fd" stroke-width="1.2"/>
    <!-- Lignes de texte droite -->
    <line x1="33" y1="25" x2="42" y2="25" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="33" y1="29" x2="42" y2="29" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="33" y1="33" x2="42" y2="33" stroke="#c4b5fd" stroke-width="1.2"/>
    <line x1="33" y1="37" x2="40" y2="37" stroke="#c4b5fd" stroke-width="1.2"/>
    <!-- Symbole étoile sur couverture droite -->
    <text x="36" y="24" font-size="8" fill="#fbbf24" text-anchor="middle">✦</text>
  </g>

  <!-- Étincelles de savoir -->
  <circle class="spark" cx="20" cy="14" r="2" fill="#fbbf24"/>
  <circle class="spark2" cx="44" cy="16" r="1.5" fill="#a78bfa"/>
  <circle class="spark3" cx="48" cy="38" r="2" fill="#fbbf24"/>
</svg>
